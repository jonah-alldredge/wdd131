<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <form action="action_page.php" method="get">
        <!-- DONT USE GET WITH SENSATIVE INFO -->
        <div>
        <label for="fname">First Name: </label>
        <input type="text" id="fname" name="fname" placeholder="Spongebob" required>
        </div>
        <br>
        <div>
        <label for="lname">Last Name: </label>
        <input type="text" id="lname" name="lname" placeholder="Squarepants" required>
        </div>
        <br>
        <div>
        <label for="pass">Password: </label>
        <input type="text" id="pass" name="pass" maxlength="12" required>
        </div>
        <br>
        <div>
        <label for="email">Email: </label>
        <input type="text" id="email" name="email" placeholder="SPants@gmail.com">
        </div>
        <br>
        <div>
        <label for="phone">Phone #: </label>
        <input type="tel" id="phone" name="phone" placeholder="(123)-456-7890">
        </div>
        <br>
        <div>
        <label for="bdate">Birthdate:  </label>
        <input type="date" id="bdate" name="bdate">
        </div>
        <br>
        <div>
        <label for="quantity">Quantity:  </label>
        <input type="number" id="quantity" name="quantity" min="0" max="99" value="1">
        </div>
        <br>
        <div>
            <label for="title">Title: </label>
            <label for="Mr.">Mr.</label>
            <input type="radio" id="Mr." name="title" value="Mr.">
            <label for="Mrs.">Mrs.</label>
            <input type="radio" id="Mrs." name="title" value="Mrs.">
            <label for="PhD.">PhD.</label>
            <input type="radio" id="PhD." name="title" value="PhD.">
        </div>
        <br>
        <div>
            <label for="quantity">Payment: </label>
            <select name="payment" id="payment">
                <option value="visa">Visa</option>
                <option value="mastercard">Mastercard</option>
                <option value="giftcard">Gift Card</option>
            </select>
        </div>
        <br>
        <div>
        <label for="subscribe">Subscribe: </label>
        <input type="checkbox" id="subscribe" name="subscribe">
        </div>
        <br>
        <div>
            <input type="reset">
        </div>
        <br>
        <div>
            <input type="submit">
        </div>
    </form>
</body>
</html>
